<!DOCTYPE HTML>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서초 러너 AI 코스</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=127d37705c82c57a9792ec156edc788b&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
  <style>
    :root {
      --blue: #3E6AE1;
      --blue-dark: #2f55b8;
      --ink: #171A20;
      --graphite: #393C41;
      --pewter: #5C5E62;
      --fog: #8E8E8E;
      --line: #EEEEEE;
      --ash: #F4F4F4;
      --red: #D92027;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      background: var(--white);
      font-family: "Pretendard", "Segoe UI", -apple-system, Arial, sans-serif;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(340px, 408px) minmax(0, 1fr);
    }

    .panel {
      z-index: 10;
      padding: 32px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(30px, 4vw, 40px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: var(--graphite);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.43;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #D0D1D2;
      border-radius: 4px;
      padding: 0 12px;
      color: var(--ink);
      background: var(--white);
      font: inherit;
      outline: none;
      transition: border-color .33s, box-shadow .25s;
    }

    input::placeholder { color: var(--fog); }

    input:focus {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .distance-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .distance-options input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .distance-options span {
      display: grid;
      min-height: 40px;
      place-items: center;
      border: 1px solid #D0D1D2;
      border-radius: 4px;
      color: var(--graphite);
      background: var(--white);
      font-weight: 500;
      cursor: pointer;
      transition: border-color .33s, background-color .33s, color .33s;
    }

    .distance-options input:checked + span {
      border-color: var(--blue);
      color: var(--white);
      background: var(--blue);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 132px;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 3px solid transparent;
      border-radius: 4px;
      padding: 4px 16px;
      color: var(--white);
      background: var(--blue);
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .33s, background-color .33s, color .33s, box-shadow .25s;
    }

    button:hover { background: var(--blue-dark); }
    button:focus-visible { box-shadow: inset 0 0 0 2px var(--ink); }
    button:disabled { opacity: .55; cursor: wait; }

    button.secondary {
      color: var(--graphite);
      background: var(--white);
      border-color: #D0D1D2;
    }

    button.secondary:hover {
      background: var(--ash);
    }

    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 32px;
      padding: 4px 12px;
      color: var(--pewter);
      background: var(--white);
      border: 1px solid #D0D1D2;
      font-size: 14px;
    }

    .result {
      display: grid;
      gap: 14px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .status {
      min-height: 42px;
      color: var(--graphite);
      font-size: 14px;
      line-height: 1.43;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 12px 0;
      background: var(--white);
    }

    .metric b {
      display: block;
      color: var(--ink);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.18;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--pewter);
      font-size: 12px;
      line-height: 1.25;
    }

    .note {
      margin: 0;
      color: var(--pewter);
      font-size: 13px;
      line-height: 1.5;
    }

    .map-area {
      position: relative;
      min-width: 0;
      min-height: 100%;
      background: var(--ash);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-badge {
      position: absolute;
      z-index: 3;
      left: 18px;
      bottom: 18px;
      max-width: min(560px, calc(100% - 36px));
      padding: 10px 12px;
      border-radius: 4px;
      color: var(--graphite);
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1.45;
    }

    .pin {
      width: 30px;
      height: 30px;
      border: 3px solid var(--white);
      border-radius: 50% 50% 50% 0;
      background: var(--red);
      transform: rotate(-45deg);
    }

    .pin::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      left: 8px;
      top: 8px;
      border-radius: 50%;
      background: var(--white);
    }

    .arrow-only {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: var(--blue);
      background: rgba(255, 255, 255, .9);
      border-radius: 50%;
      font-size: 28px;
      line-height: 1;
      transform: rotate(var(--angle));
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 64vh;
      }

      .panel { padding: 24px; }
    }

    @media (max-width: 520px) {
      .button-row,
      .metric-grid,
      .distance-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <section>
        <h1>서초 러너 AI 코스</h1>
        <p>카카오 지도 위에서 보행자 통행 가능 경로를 찾고, 서초구 신호등 데이터를 기준으로 지나가는 횡단보도를 최대한 줄입니다.</p>
      </section>

      <form id="routeForm">
        <label>
          시작점
          <input id="startInput" placeholder="예: 교대역, 양재역, 37.4937, 127.0142">
        </label>
        <label>
          도착점
          <input id="endInput" placeholder="예: 예술의전당, 양재천 카페거리">
        </label>
        <label>
          목표 거리
          <div class="distance-options">
            <label><input type="radio" name="targetKm" value="5" checked><span>5km</span></label>
            <label><input type="radio" name="targetKm" value="10"><span>10km</span></label>
          </div>
        </label>
        <div class="button-row">
          <button id="makeRoute" type="submit">AI 추천코스</button>
          <button id="reroute" class="secondary" type="button">다시 짜기</button>
        </div>
      </form>

      <div class="quick">
        <button class="chip" type="button" data-start="교대역" data-end="예술의전당">교대역 → 예술의전당</button>
        <button class="chip" type="button" data-start="고속터미널역" data-end="반포종합운동장">고속터미널 → 반포</button>
        <button class="chip" type="button" data-start="양재역" data-end="양재천 카페거리">양재역 → 양재천</button>
      </div>

      <section class="result">
        <div class="status" id="status">시작점과 도착점, 목표 거리를 선택하고 AI 추천코스를 눌러 주세요.</div>
        <div class="metric-grid">
          <div class="metric"><b id="distance">-</b><span>실제 경로 거리</span></div>
          <div class="metric"><b id="duration">-</b><span>예상 시간</span></div>
          <div class="metric"><b id="crossings">-</b><span>지나간 횡단보도</span></div>
        </div>
        <p class="note">빨간 점은 전체 신호등 데이터가 아니라 이번 경로가 실제로 매우 가까이 지난 횡단 지점만 표시합니다.</p>
      </section>
    </aside>

    <main class="map-area">
      <div id="map"></div>
      <div class="map-badge" id="mapBadge">파란 선은 추천 러닝 코스입니다. 겹치는 구간은 텍스트 없이 화살표만 표시합니다.</div>
    </main>
  </div>

  <script src="./traffic-lights.js"></script>
  <script>
    const KAKAO_READY = typeof kakao !== "undefined" && kakao.maps;
    const SEOCHO_CENTER = { lat: 37.4837, lng: 127.0324 };
    const RUN_PACE_MIN_PER_KM = 6 + 20 / 60;
    const lightRows = window.SEOCHO_TRAFFIC_LIGHTS || [];
    const landmarks = {
      "교대역": [37.4937, 127.0142],
      "고속터미널역": [37.5049, 127.0049],
      "반포종합운동장": [37.4999, 126.9967],
      "예술의전당": [37.4803, 127.0115],
      "양재역": [37.4846, 127.0344],
      "양재천 카페거리": [37.4775, 127.0397],
      "강남역": [37.4979, 127.0276],
      "서초구청": [37.4836, 127.0327],
      "내방역": [37.4876, 126.9936],
      "사당역": [37.4766, 126.9816],
      "방배역": [37.4814, 126.9976],
      "남부터미널역": [37.4850, 127.0162],
      "서울고등학교": [37.4864, 127.0086]
    };

    const statusEl = document.querySelector("#status");
    const distanceEl = document.querySelector("#distance");
    const durationEl = document.querySelector("#duration");
    const crossingsEl = document.querySelector("#crossings");
    const mapBadgeEl = document.querySelector("#mapBadge");
    const startInput = document.querySelector("#startInput");
    const endInput = document.querySelector("#endInput");
    const makeRouteBtn = document.querySelector("#makeRoute");
    const rerouteBtn = document.querySelector("#reroute");

    let map;
    let geocoder;
    let places;
    let overlays = [];
    let polylines = [];
    let circles = [];
    let lastStart = null;
    let lastEnd = null;
    let variantCursor = 0;

    if (typeof proj4 === "function") {
      proj4.defs("EPSG:5186", "+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=600000 +ellps=GRS80 +units=m +no_defs");
    }

    function tmToLatLng(x, y) {
      if (typeof proj4 === "function") {
        const result = proj4("EPSG:5186", "WGS84", [x, y]);
        return { lat: result[1], lng: result[0], x, y };
      }
      const lat = 38 + ((y - 600000) / 111000);
      const lng = 127 + ((x - 200000) / (111000 * Math.cos(lat * Math.PI / 180)));
      return { lat, lng, x, y };
    }

    function latLngToTm(lat, lng) {
      if (typeof proj4 === "function") {
        const result = proj4("WGS84", "EPSG:5186", [lng, lat]);
        return { x: result[0], y: result[1] };
      }
      return {
        x: 200000 + (lng - 127) * 111000 * Math.cos(lat * Math.PI / 180),
        y: 600000 + (lat - 38) * 111000
      };
    }

    const trafficLights = lightRows.map(([id, addr, name, x, y]) => ({
      id,
      addr,
      name,
      ...tmToLatLng(x, y)
    })).filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng));

    function initMap() {
      if (!KAKAO_READY) {
        statusEl.textContent = "카카오 지도 SDK를 불러오지 못했습니다. 카카오 앱 키의 JavaScript 플랫폼 도메인 설정을 확인해 주세요.";
        return;
      }
      map = new kakao.maps.Map(document.querySelector("#map"), {
        center: new kakao.maps.LatLng(SEOCHO_CENTER.lat, SEOCHO_CENTER.lng),
        level: 5
      });
      geocoder = new kakao.maps.services.Geocoder();
      places = new kakao.maps.services.Places();
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
    }

    function toLatLng(point) {
      return new kakao.maps.LatLng(point.lat, point.lng);
    }

    function clearMap() {
      polylines.forEach((line) => line.setMap(null));
      overlays.forEach((overlay) => overlay.setMap(null));
      circles.forEach((circle) => circle.setMap(null));
      polylines = [];
      overlays = [];
      circles = [];
    }

    function parseCoordinate(text) {
      const match = text.trim().match(/(-?\d+(?:\.\d+)?)\s*[, ]\s*(-?\d+(?:\.\d+)?)/);
      if (!match) return null;
      const a = Number(match[1]);
      const b = Number(match[2]);
      if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lng: b, label: text.trim(), ...latLngToTm(a, b) };
      if (Math.abs(b) <= 90 && Math.abs(a) <= 180) return { lat: b, lng: a, label: text.trim(), ...latLngToTm(b, a) };
      return null;
    }

    function findLocalPlace(text) {
      const normalized = text.trim().replace(/\s/g, "");
      for (const [name, latLng] of Object.entries(landmarks)) {
        const key = name.replace(/\s/g, "");
        if (key.includes(normalized) || normalized.includes(key)) {
          const tm = latLngToTm(latLng[0], latLng[1]);
          return { label: name, lat: latLng[0], lng: latLng[1], ...tm };
        }
      }
      return null;
    }

    function kakaoPlaceSearch(text) {
      return new Promise((resolve, reject) => {
        if (!places) {
          reject(new Error("카카오 장소 검색을 사용할 수 없습니다."));
          return;
        }
        places.keywordSearch(`서초구 ${text}`, (rows, status) => {
          if (status === kakao.maps.services.Status.OK && rows.length) {
            const row = rows[0];
            const lat = Number(row.y);
            const lng = Number(row.x);
            resolve({ label: row.place_name || text, lat, lng, ...latLngToTm(lat, lng) });
          } else {
            reject(new Error(`"${text}" 위치를 찾지 못했습니다.`));
          }
        });
      });
    }

    async function geocode(text) {
      const coord = parseCoordinate(text);
      if (coord) return coord;
      const local = findLocalPlace(text);
      if (local) return local;
      return kakaoPlaceSearch(text);
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function pointToSegmentDistance(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (!dx && !dy) return distance(p, a);
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
      return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
    }

    function routeLength(points) {
      return points.slice(1).reduce((sum, p, i) => sum + distance(points[i], p), 0);
    }

    function latLngToRoutePoint(lat, lng) {
      return { lat, lng, ...latLngToTm(lat, lng) };
    }

    function tmPointToLatLng(point) {
      const p = tmToLatLng(point.x, point.y);
      return [p.lat, p.lng];
    }

    function buildWaypointSets(start, end, targetMeters) {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const direct = Math.max(distance(start, end), 1);
      const nx = -dy / direct;
      const ny = dx / direct;
      const tx = dx / direct;
      const ty = dy / direct;
      const detour = Math.max(targetMeters - direct, targetMeters * .44);
      const side = Math.min(Math.max(detour / 2.8, 520), targetMeters / 2.35);
      const forward = Math.min(Math.max(targetMeters / 6, 480), 1550);
      const center = { x: (start.x + end.x) / 2, y: (start.y + end.y) / 2 };
      const signs = [1, -1, 1.28, -1.28, .7, -.7];

      return signs.map((sign, index) => {
        const spread = side * sign;
        const push = forward * ((index % 2) ? -.34 : .34);
        const a = { x: center.x - tx * forward + nx * spread + tx * push, y: center.y - ty * forward + ny * spread + ty * push };
        const b = { x: center.x + tx * forward + nx * spread * .9 - tx * push, y: center.y + ty * forward + ny * spread * .9 - ty * push };
        const c = { x: center.x + nx * spread * .32 - tx * forward * .16, y: center.y + ny * spread * .32 - ty * forward * .16 };
        return index < 2 ? [start, a, b, end] : [start, a, c, b, end];
      });
    }

    async function fetchPedestrianRoute(points) {
      const coords = points.map(tmPointToLatLng).map(([lat, lng]) => `${lng.toFixed(6)},${lat.toFixed(6)}`).join(";");
      const url = `https://routing.openstreetmap.de/routed-foot/route/v1/foot/${coords}?overview=full&geometries=geojson&steps=false`;
      const response = await fetch(url);
      if (!response.ok) throw new Error("보행자 경로 API 응답이 없습니다.");
      const data = await response.json();
      if (!data.routes || !data.routes[0]) throw new Error("보행자 경로를 찾지 못했습니다.");
      const route = data.routes[0];
      const latLngs = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      const tmPoints = latLngs.map(([lat, lng]) => latLngToRoutePoint(lat, lng));
      return { latLngs, tmPoints, meters: route.distance };
    }

    function analyzeCrossings(tmPoints) {
      const minX = Math.min(...tmPoints.map((p) => p.x)) - 110;
      const maxX = Math.max(...tmPoints.map((p) => p.x)) + 110;
      const minY = Math.min(...tmPoints.map((p) => p.y)) - 110;
      const maxY = Math.max(...tmPoints.map((p) => p.y)) + 110;
      const nearby = [];
      let score = 0;

      trafficLights.forEach((light) => {
        if (light.x < minX || light.x > maxX || light.y < minY || light.y > maxY) return;
        let nearest = Infinity;
        for (let i = 0; i < tmPoints.length - 1; i += 1) {
          nearest = Math.min(nearest, pointToSegmentDistance(light, tmPoints[i], tmPoints[i + 1]));
          if (nearest < 8) break;
        }
        if (nearest < 48) {
          nearby.push({ ...light, nearest });
          score += (48 - nearest) / 48;
        } else if (nearest < 95) {
          score += (95 - nearest) / 260;
        }
      });

      nearby.sort((a, b) => a.nearest - b.nearest);
      const clusters = [];
      nearby.filter((p) => p.nearest < 10).forEach((point) => {
        const cluster = clusters.find((group) => group.some((member) => distance(member, point) < 75));
        if (cluster) cluster.push(point);
        else clusters.push([point]);
      });
      const passedCrossings = clusters.map((cluster) => cluster[0]);
      return { nearby, passedCrossings, score, crossed: passedCrossings.length };
    }

    async function choosePedestrianRoute(start, end, targetMeters) {
      const waypointSets = buildWaypointSets(start, end, targetMeters);
      const routes = [];
      for (let i = 0; i < waypointSets.length; i += 1) {
        try {
          const route = await fetchPedestrianRoute(waypointSets[(i + variantCursor) % waypointSets.length]);
          const crossing = analyzeCrossings(route.tmPoints);
          routes.push({
            ...route,
            crossings: crossing.nearby,
            passedCrossings: crossing.passedCrossings,
            crossed: crossing.crossed,
            score: Math.abs(route.meters - targetMeters) * 3 + crossing.score * 1100 + i * 18
          });
        } catch (error) {
          console.warn(error);
        }
      }
      if (routes.length) return routes.sort((a, b) => a.score - b.score)[0];

      const fallbackPoints = waypointSets[variantCursor % waypointSets.length];
      const crossing = analyzeCrossings(fallbackPoints);
      return {
        latLngs: fallbackPoints.map(tmPointToLatLng),
        tmPoints: fallbackPoints,
        meters: routeLength(fallbackPoints),
        crossings: crossing.nearby,
        passedCrossings: crossing.passedCrossings,
        crossed: crossing.crossed,
        fallback: true
      };
    }

    function routeAngle(points, index) {
      const a = points[Math.max(0, Math.min(index, points.length - 2))];
      const b = points[Math.max(1, Math.min(index + 1, points.length - 1))];
      return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    }

    function detectOverlapMarkers(points) {
      const buckets = new Map();
      const grid = 18;
      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        if (distance(a, b) < 10) continue;
        const aKey = `${Math.round(a.x / grid)},${Math.round(a.y / grid)}`;
        const bKey = `${Math.round(b.x / grid)},${Math.round(b.y / grid)}`;
        const key = [aKey, bKey].sort().join("|");
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(i);
      }

      const markers = [];
      buckets.forEach((indices) => {
        if (indices.length < 2) return;
        if (!indices.some((index) => Math.abs(index - indices[0]) > 10)) return;
        const entryIndex = indices[0];
        const exitIndex = indices[indices.length - 1];
        markers.push({ point: points[entryIndex], angle: routeAngle(points, entryIndex) });
        markers.push({ point: points[Math.min(points.length - 1, exitIndex + 1)], angle: routeAngle(points, exitIndex) });
      });
      return markers.slice(0, 8);
    }

    function addPin(point, title) {
      const overlay = new kakao.maps.CustomOverlay({
        position: toLatLng(point),
        content: `<div class="pin" title="${title}"></div>`,
        yAnchor: 1
      });
      overlay.setMap(map);
      overlays.push(overlay);
    }

    function addArrow(point, angle) {
      const overlay = new kakao.maps.CustomOverlay({
        position: toLatLng(point),
        content: `<div class="arrow-only" style="--angle:${angle}deg">→</div>`,
        xAnchor: .5,
        yAnchor: .5
      });
      overlay.setMap(map);
      overlays.push(overlay);
    }

    function drawCrossings(crossings) {
      crossings.forEach((p) => {
        const circle = new kakao.maps.Circle({
          center: toLatLng(p),
          radius: 7,
          strokeWeight: 1,
          strokeColor: "#D92027",
          strokeOpacity: .72,
          fillColor: "#D92027",
          fillOpacity: .58
        });
        circle.setMap(map);
        circles.push(circle);
      });
    }

    function drawRoute(start, end, route, targetKm) {
      clearMap();
      const path = route.latLngs.map(([lat, lng]) => new kakao.maps.LatLng(lat, lng));
      const whiteLine = new kakao.maps.Polyline({
        path,
        strokeWeight: 15,
        strokeColor: "#FFFFFF",
        strokeOpacity: .95,
        strokeStyle: "solid"
      });
      const blueLine = new kakao.maps.Polyline({
        path,
        strokeWeight: 8,
        strokeColor: "#3E6AE1",
        strokeOpacity: .98,
        strokeStyle: "solid"
      });
      whiteLine.setMap(map);
      blueLine.setMap(map);
      polylines.push(whiteLine, blueLine);

      drawCrossings(route.passedCrossings);
      detectOverlapMarkers(route.tmPoints).forEach((marker) => addArrow(marker.point, marker.angle));
      addPin(start, "시작점");
      addPin(end, "도착점");

      const bounds = new kakao.maps.LatLngBounds();
      path.forEach((point) => bounds.extend(point));
      bounds.extend(toLatLng(start));
      bounds.extend(toLatLng(end));
      map.setBounds(bounds, 56, 56, 56, 56);

      const km = route.meters / 1000;
      distanceEl.textContent = `${km.toFixed(2)} km`;
      durationEl.textContent = `${Math.max(1, Math.round(km * RUN_PACE_MIN_PER_KM))}분`;
      crossingsEl.textContent = `${route.crossed}개`;
      statusEl.textContent = route.fallback
        ? `보행자 경로 서버가 불안정해 임시 후보선을 표시했습니다. 다시 짜기를 눌러 재시도해 주세요.`
        : `${targetKm}km 목표에 맞춰 보행자 통행 가능 경로를 만들었습니다. 지나간 횡단보도는 ${route.crossed}개입니다.`;
      mapBadgeEl.textContent = `빨간 점 ${route.crossed}개는 이번 코스가 실제로 매우 가까이 지난 횡단 지점입니다. 전체 신호등 점은 숨겼습니다.`;
    }

    async function makeRoute(reroll = false) {
      const startText = startInput.value.trim();
      const endText = endInput.value.trim();
      const targetKm = Number(document.querySelector("input[name='targetKm']:checked").value);
      if (!startText || !endText) {
        statusEl.textContent = "시작점과 도착점을 모두 입력해 주세요.";
        return;
      }
      if (!KAKAO_READY) return;

      makeRouteBtn.disabled = true;
      rerouteBtn.disabled = true;
      statusEl.textContent = reroll
        ? `${targetKm}km에 맞는 다른 후보를 계산 중입니다.`
        : `${targetKm}km 목표 거리와 횡단 지점 데이터를 비교하고 있습니다.`;

      try {
        if (!reroll || !lastStart || !lastEnd) {
          const results = await Promise.all([geocode(startText), geocode(endText)]);
          lastStart = results[0];
          lastEnd = results[1];
          variantCursor = 0;
        } else {
          variantCursor += 1;
        }
        const route = await choosePedestrianRoute(lastStart, lastEnd, targetKm * 1000);
        drawRoute(lastStart, lastEnd, route, targetKm);
      } catch (error) {
        statusEl.textContent = error.message || "코스를 계산하지 못했습니다.";
      } finally {
        makeRouteBtn.disabled = false;
        rerouteBtn.disabled = false;
      }
    }

    document.querySelector("#routeForm").addEventListener("submit", (event) => {
      event.preventDefault();
      makeRoute(false);
    });

    rerouteBtn.addEventListener("click", () => makeRoute(true));

    document.querySelectorAll(".chip").forEach((button) => {
      button.addEventListener("click", () => {
        startInput.value = button.dataset.start;
        endInput.value = button.dataset.end;
        makeRoute(false);
      });
    });

    document.querySelectorAll("input[name='targetKm']").forEach((input) => {
      input.addEventListener("change", () => {
        lastStart = null;
        lastEnd = null;
      });
    });

    initMap();
    startInput.value = "교대역";
    endInput.value = "예술의전당";
  </script>
</body>
</html>
