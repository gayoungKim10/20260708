<!DOCTYPE HTML>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOPLESS</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FQM5TN868P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-FQM5TN868P');
  </script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=127d37705c82c57a9792ec156edc788b&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
  <style>
    :root {
      --green: #1ed760;
      --green-dark: #1db954;
      --ink: #ffffff;
      --silver: #b3b3b3;
      --near-white: #fdfdfd;
      --bg: #121212;
      --surface: #181818;
      --surface-2: #1f1f1f;
      --surface-3: #252525;
      --border: #4d4d4d;
      --red: #f3727f;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Pretendard", "Segoe UI", -apple-system, Arial, sans-serif;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(340px, 420px) minmax(0, 1fr);
    }

    .panel {
      z-index: 10;
      padding: 28px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      color: var(--near-white);
      font-size: clamp(30px, 4vw, 40px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 1.25em;
      height: 1.25em;
      flex: 0 0 auto;
    }

    p {
      margin: 8px 0 0;
      color: var(--silver);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.43;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--near-white);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 500px;
      padding: 0 12px;
      color: var(--ink);
      background: var(--surface-2);
      font: inherit;
      outline: none;
      transition: border-color .33s, box-shadow .25s;
    }

    input::placeholder { color: var(--silver); }

    input:focus {
      box-shadow: rgb(124, 124, 124) 0 0 0 1px inset;
    }

    .distance-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .distance-options input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .distance-options span {
      display: grid;
      min-height: 40px;
      place-items: center;
      border: 0;
      border-radius: 9999px;
      color: var(--silver);
      background: var(--surface-2);
      font-weight: 500;
      cursor: pointer;
      transition: border-color .33s, background-color .33s, color .33s;
    }

    .distance-options input:checked + span {
      color: #000;
      background: var(--green);
    }

    .button-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(132px, .78fr);
      gap: 10px;
      align-items: center;
    }

    #makeRoute {
      min-height: 68px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .route-control-stack {
      display: grid;
      gap: 8px;
    }

    #findNew {
      width: 100%;
      min-height: 44px;
      color: var(--ink);
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .history-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    #prevRoute,
    #nextRoute {
      width: 100%;
      min-height: 40px;
      padding: 0;
      border-radius: 9999px;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
      align-self: center;
    }

    #prevRoute:disabled,
    #nextRoute:disabled,
    #findNew:disabled {
      opacity: .38;
      cursor: not-allowed;
    }

    .watch-button {
      width: 100%;
      min-height: 44px;
      color: var(--ink);
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 13px;
      letter-spacing: 1.1px;
    }

    .watch-button[hidden] { display: none; }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 9999px;
      padding: 4px 16px;
      color: #000;
      background: var(--green);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      cursor: pointer;
      transition: border-color .33s, background-color .33s, color .33s, box-shadow .25s;
    }

    button:hover { background: var(--green-dark); }
    button:focus-visible { box-shadow: rgb(124,124,124) 0 0 0 1px inset; }
    button:disabled { opacity: .55; cursor: wait; }

    button.secondary {
      color: var(--ink);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: var(--surface-3);
    }

    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 32px;
      padding: 4px 12px;
      color: var(--silver);
      background: var(--surface-2);
      border: 0;
      font-size: 14px;
    }

    .result {
      display: grid;
      gap: 14px;
      padding-top: 22px;
      border-top: 1px solid rgba(179, 179, 179, .18);
    }

    .status {
      min-height: 42px;
      color: var(--silver);
      font-size: 14px;
      line-height: 1.43;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-width: 0;
      padding: 12px 0;
      padding: 14px;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: rgba(0,0,0,.3) 0 8px 8px;
    }

    .metric b {
      display: block;
      color: var(--near-white);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.18;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--silver);
      font-size: 12px;
      line-height: 1.25;
    }

    .note {
      margin: 0;
      color: var(--silver);
      font-size: 13px;
      line-height: 1.5;
    }

    .map-area {
      position: relative;
      min-width: 0;
      min-height: 100%;
      background: var(--surface);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-badge {
      position: absolute;
      z-index: 3;
      left: 18px;
      bottom: 18px;
      max-width: min(560px, calc(100% - 36px));
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--ink);
      background: rgba(24, 24, 24, .9);
      box-shadow: rgba(0,0,0,.5) 0 8px 24px;
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1.45;
    }

    .pin {
      width: 30px;
      height: 30px;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      background: var(--red);
      transform: rotate(-45deg);
    }

    .pin::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      left: 8px;
      top: 8px;
      border-radius: 50%;
      background: #fff;
    }

    .route-arrow {
      position: relative;
      width: 14px;
      height: 14px;
      pointer-events: none;
      transform-origin: 50% 50%;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, .22));
    }

    .route-arrow::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 2px;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 9px solid rgba(255, 255, 255, .88);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 64vh;
      }

      .panel { padding: 24px; }
    }

    @media (max-width: 520px) {
      .button-row,
      .metric-grid,
      .distance-options { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      html,
      body {
        height: auto;
        min-height: 100%;
        overflow-x: hidden;
      }

      .app {
        height: auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      .panel {
        overflow: visible;
        padding: max(22px, env(safe-area-inset-top)) 22px 20px;
        gap: 20px;
      }

      .map-area {
        flex: 0 0 auto;
        width: 100%;
        min-height: 0;
        height: min(52dvh, 480px);
      }

      .map-badge {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
        font-size: 12px;
      }
    }

    .map-pick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .map-pick-row button {
      min-height: 36px;
      color: var(--silver);
      background: var(--surface-2);
      letter-spacing: .8px;
    }

    .map-pick-row button.active {
      color: #000;
      background: var(--green);
    }

    .loop-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 9999px;
      color: var(--silver);
      background: var(--surface-2);
      font-size: 14px;
      cursor: pointer;
    }

    .loop-toggle input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--green);
    }

    .place-field {
      position: relative;
    }

    .place-suggestions {
      position: absolute;
      z-index: 20;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      display: none;
      max-height: 220px;
      overflow-y: auto;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      box-shadow: rgba(0,0,0,.45) 0 12px 24px;
    }

    .place-suggestions.active {
      display: grid;
      gap: 4px;
    }

    .place-suggestion {
      width: 100%;
      min-height: 44px;
      display: grid;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }

    .place-suggestion:hover {
      background: var(--surface-3);
    }

    .place-suggestion small {
      color: var(--silver);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <section>
        <h1 class="brand-title">
          <span>STOPLESS</span>
          <svg class="brand-logo" viewBox="0 0 96 96" role="img" aria-label="STOPLESS runner logo">
            <path d="M14 76c24 4 49-1 68-18" fill="none" stroke="#1ed760" stroke-width="5" stroke-linecap="round"/>
            <path d="M24 70c17 1 37-3 52-15" fill="none" stroke="#44e574" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 8"/>
            <path d="M78 40c4 0 7 3 7 7 0 6-7 12-7 12s-7-6-7-12c0-4 3-7 7-7z" fill="#2abf68"/>
            <circle cx="78" cy="47" r="2.6" fill="#121212"/>
            <circle cx="55" cy="18" r="8" fill="#137a49"/>
            <path d="M48 27l-9 15 14 8 9-15c3-5-8-14-14-8z" fill="#1fab63" stroke="#137a49" stroke-width="3" stroke-linejoin="round"/>
            <path d="M47 29c-7 3-13 8-19 15" fill="none" stroke="#1fab63" stroke-width="6" stroke-linecap="round"/>
            <path d="M29 43l-7 11" fill="none" stroke="#137a49" stroke-width="4" stroke-linecap="round"/>
            <path d="M57 31l12 10 8-11" fill="none" stroke="#1fab63" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M54 47l-13 16-19 8" fill="none" stroke="#137a49" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M50 50l14 11 8 16" fill="none" stroke="#1ed760" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17 72c0 9 8 11 16 8" fill="none" stroke="#44e574" stroke-width="5" stroke-linecap="round"/>
            <path d="M65 78c7 5 15 5 21 0" fill="none" stroke="#44e574" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </h1>
        <p>카카오 지도 위에서 보행자 통행 가능 경로를 찾고, 서울 전체 신호등 데이터를 기준으로 지나가는 횡단보도를 최대한 줄입니다.</p>
      </section>

      <form id="routeForm">
        <label class="place-field">
          시작점
          <input id="startInput" placeholder="예: 교대역, 양재역, 37.4937, 127.0142">
          <div id="startSuggestions" class="place-suggestions"></div>
        </label>
        <label class="place-field">
          도착점
          <input id="endInput" placeholder="예: 예술의전당, 양재천 카페거리">
          <div id="endSuggestions" class="place-suggestions"></div>
        </label>
        <div class="map-pick-row" aria-label="지도에서 위치 선택">
          <button id="pickStart" class="secondary" type="button">지도에서 시작점 선택</button>
          <button id="pickEnd" class="secondary" type="button">지도에서 도착점 선택</button>
        </div>
        <label>
          목표 거리
          <div class="distance-options">
            <label><input type="radio" name="targetRange" value="1-3"><span>1-3km</span></label>
            <label><input type="radio" name="targetRange" value="3-5"><span>3-5km</span></label>
            <label><input type="radio" name="targetRange" value="5-7" checked><span>5-7km</span></label>
            <label><input type="radio" name="targetRange" value="7-9"><span>7-9km</span></label>
            <label><input type="radio" name="targetRange" value="9-11"><span>9-11km</span></label>
          </div>
        </label>
        <label class="loop-toggle">
          <input id="loopRoute" type="checkbox">
          출발지로 돌아오는 루프 코스
        </label>
        <div class="button-row">
          <button id="makeRoute" type="submit">RUN!</button>
          <div class="route-control-stack">
            <button id="findNew" class="secondary" type="button" aria-label="새 코스 찾기" title="새 코스 찾기">FIND NEW</button>
            <div class="history-nav" aria-label="저장된 코스 탐색">
              <button id="prevRoute" class="secondary" type="button" aria-label="이전 코스" title="이전 코스" disabled>‹</button>
              <button id="nextRoute" class="secondary" type="button" aria-label="다음 코스" title="다음 코스" disabled>›</button>
            </div>
          </div>
        </div>
        <button id="sendWatch" class="watch-button" type="button" hidden>이 코스를 내 WATCH로 보내기</button>
      </form>

      <div class="quick">
        <button class="chip" type="button" data-start="교대역" data-end="예술의전당">교대역 → 예술의전당</button>
        <button class="chip" type="button" data-start="고속터미널역" data-end="반포종합운동장">고속터미널 → 반포</button>
        <button class="chip" type="button" data-start="양재역" data-end="양재천 카페거리">양재역 → 양재천</button>
      </div>

      <section class="result">
        <div class="status" id="status">시작점과 도착점, 목표 거리를 선택하고 RUN!을 눌러 주세요.</div>
        <div class="metric-grid">
          <div class="metric"><b id="distance">-</b><span>실제 경로 거리</span></div>
          <div class="metric"><b id="crossings">-</b><span>신호등 있는 최대 횡단보도 수</span></div>
        </div>
        <p class="note">빨간 점은 전체 신호등 데이터가 아니라 이번 경로가 실제로 매우 가까이 지난 횡단 지점만 표시합니다.</p>
      </section>
    </aside>

    <main class="map-area">
      <div id="map"></div>
      <div class="map-badge" id="mapBadge">파란 선은 추천 러닝 코스입니다. 왕복 구간도 하나의 선으로 표시합니다.</div>
    </main>
  </div>

  <script src="./traffic-lights.js"></script>
  <script>
    const KAKAO_READY = typeof kakao !== "undefined" && kakao.maps;
    const SEOUL_CENTER = { lat: 37.5665, lng: 126.9780 };
    const lightRows = window.SEOCHO_TRAFFIC_LIGHTS || [];
    const landmarks = {
      "교대역": [37.4937, 127.0142],
      "고속터미널역": [37.5049, 127.0049],
      "반포종합운동장": [37.4999, 126.9967],
      "예술의전당": [37.4803, 127.0115],
      "양재역": [37.4846, 127.0344],
      "양재천 카페거리": [37.4775, 127.0397],
      "강남역": [37.4979, 127.0276],
      "서초구청": [37.4836, 127.0327],
      "내방역": [37.4876, 126.9936],
      "사당역": [37.4766, 126.9816],
      "방배역": [37.4814, 126.9976],
      "남부터미널역": [37.4850, 127.0162],
      "서울고등학교": [37.4864, 127.0086],
      "경복궁역": [37.5758, 126.9736],
      "경복궁": [37.5796, 126.9770]
    };

    const statusEl = document.querySelector("#status");
    const distanceEl = document.querySelector("#distance");
    const crossingsEl = document.querySelector("#crossings");
    const mapBadgeEl = document.querySelector("#mapBadge");
    const startInput = document.querySelector("#startInput");
    const endInput = document.querySelector("#endInput");
    const startSuggestions = document.querySelector("#startSuggestions");
    const endSuggestions = document.querySelector("#endSuggestions");
    const makeRouteBtn = document.querySelector("#makeRoute");
    const findNewBtn = document.querySelector("#findNew");
    const prevRouteBtn = document.querySelector("#prevRoute");
    const nextRouteBtn = document.querySelector("#nextRoute");
    const pickStartBtn = document.querySelector("#pickStart");
    const pickEndBtn = document.querySelector("#pickEnd");
    const loopRouteInput = document.querySelector("#loopRoute");
    const sendWatchBtn = document.querySelector("#sendWatch");

    let map;
    let geocoder;
    let places;
    let overlays = [];
    let draftStartOverlay = null;
    let draftEndOverlay = null;
    let polylines = [];
    let circles = [];
    let lastStart = null;
    let lastEnd = null;
    let pickMode = null;
    let routesHistory = [];
    let currentRouteIndex = -1;
    let routeCandidateState = null;
    let startSuggestTimer = null;
    let endSuggestTimer = null;
    let selectedStartPlace = null;
    let selectedEndPlace = null;

    if (typeof proj4 === "function") {
      proj4.defs("EPSG:5186", "+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=600000 +ellps=GRS80 +units=m +no_defs");
    }

    function tmToLatLng(x, y) {
      if (typeof proj4 === "function") {
        const result = proj4("EPSG:5186", "WGS84", [x, y]);
        return { lat: result[1], lng: result[0], x, y };
      }
      const lat = 38 + ((y - 600000) / 111000);
      const lng = 127 + ((x - 200000) / (111000 * Math.cos(lat * Math.PI / 180)));
      return { lat, lng, x, y };
    }

    function latLngToTm(lat, lng) {
      if (typeof proj4 === "function") {
        const result = proj4("WGS84", "EPSG:5186", [lng, lat]);
        return { x: result[0], y: result[1] };
      }
      return {
        x: 200000 + (lng - 127) * 111000 * Math.cos(lat * Math.PI / 180),
        y: 600000 + (lat - 38) * 111000
      };
    }

    const trafficLights = lightRows.map(([id, addr, name, x, y]) => ({
      id,
      addr,
      name,
      ...tmToLatLng(x, y)
    })).filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng));

    function initMap() {
      if (!KAKAO_READY) {
        statusEl.textContent = "카카오 지도 SDK를 불러오지 못했습니다. 카카오 앱 키의 JavaScript 플랫폼 도메인 설정을 확인해 주세요.";
        return;
      }
      map = new kakao.maps.Map(document.querySelector("#map"), {
        center: new kakao.maps.LatLng(SEOUL_CENTER.lat, SEOUL_CENTER.lng),
        level: 8
      });
      geocoder = new kakao.maps.services.Geocoder();
      places = new kakao.maps.services.Places();
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
      kakao.maps.event.addListener(map, "click", handleMapClick);
    }

    function toLatLng(point) {
      return new kakao.maps.LatLng(point.lat, point.lng);
    }

    function clearMap() {
      polylines.forEach((line) => line.setMap(null));
      overlays.forEach((overlay) => overlay.setMap(null));
      circles.forEach((circle) => circle.setMap(null));
      polylines = [];
      overlays = [];
      circles = [];
    }

    function clearDraftPins() {
      if (draftStartOverlay) draftStartOverlay.setMap(null);
      if (draftEndOverlay) draftEndOverlay.setMap(null);
      draftStartOverlay = null;
      draftEndOverlay = null;
    }

    function setPickMode(mode) {
      pickMode = pickMode === mode ? null : mode;
      pickStartBtn.classList.toggle("active", pickMode === "start");
      pickEndBtn.classList.toggle("active", pickMode === "end");
      mapBadgeEl.textContent = pickMode
        ? `지도에서 ${pickMode === "start" ? "시작점" : "도착점"}을 클릭해 주세요.`
        : "파란 선은 추천 러닝 코스입니다. 왕복 구간도 하나의 선으로 표시합니다.";
    }

    function addDraftPin(point, title, mode) {
      if (mode === "start" && draftStartOverlay) draftStartOverlay.setMap(null);
      if (mode === "end" && draftEndOverlay) draftEndOverlay.setMap(null);
      const overlay = new kakao.maps.CustomOverlay({
        position: toLatLng(point),
        content: `<div class="pin" title="${title}"></div>`,
        yAnchor: 1
      });
      overlay.setMap(map);
      if (mode === "start") draftStartOverlay = overlay;
      if (mode === "end") draftEndOverlay = overlay;
    }

    function handleMapClick(event) {
      if (!pickMode) return;
      const lat = event.latLng.getLat();
      const lng = event.latLng.getLng();
      const value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      const point = { lat, lng, ...latLngToTm(lat, lng) };
      if (pickMode === "start") {
        startInput.value = value;
        selectedStartPlace = null;
        syncLoopDestination();
        addDraftPin(point, "시작점", "start");
      } else {
        endInput.value = value;
        selectedEndPlace = null;
        addDraftPin(point, "도착점", "end");
      }
      setWatchButtonVisible(false);
      lastStart = null;
      lastEnd = null;
      setPickMode(null);
    }

    function parseCoordinate(text) {
      const match = text.trim().match(/(-?\d+(?:\.\d+)?)\s*[, ]\s*(-?\d+(?:\.\d+)?)/);
      if (!match) return null;
      const a = Number(match[1]);
      const b = Number(match[2]);
      if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lng: b, label: text.trim(), ...latLngToTm(a, b) };
      if (Math.abs(b) <= 90 && Math.abs(a) <= 180) return { lat: b, lng: a, label: text.trim(), ...latLngToTm(b, a) };
      return null;
    }

    function findLocalPlace(text) {
      const normalized = text.trim().replace(/\s/g, "");
      for (const [name, latLng] of Object.entries(landmarks)) {
        const key = name.replace(/\s/g, "");
        if (key === normalized) {
          const tm = latLngToTm(latLng[0], latLng[1]);
          return { label: name, lat: latLng[0], lng: latLng[1], ...tm };
        }
      }
      return null;
    }

    function kakaoPlaceSearch(text) {
      return new Promise((resolve, reject) => {
        if (!places) {
          reject(new Error('Kakao place search is not available.'));
          return;
        }

        const queries = [text, `서울 ${text}`, `서초구 ${text}`];
        let queryIndex = 0;

        const tryNextQuery = () => {
          const query = queries[queryIndex];
          places.keywordSearch(query, (rows, status) => {
            if (status === kakao.maps.services.Status.OK && rows.length) {
              const row = rows[0];
              const lat = Number(row.y);
              const lng = Number(row.x);
              resolve({ label: row.place_name || text, lat, lng, ...latLngToTm(lat, lng) });
              return;
            }

            queryIndex += 1;
            if (queryIndex < queries.length) {
              tryNextQuery();
            } else {
              reject(new Error(`Cannot find location: ${text}`));
            }
          });
        };

        tryNextQuery();
      });
    }

    function searchKakaoPlaces(text) {
      return new Promise((resolve) => {
        if (!places || text.trim().length < 2) {
          resolve([]);
          return;
        }

        places.keywordSearch(`서울 ${text}`, (rows, status) => {
          if (status === kakao.maps.services.Status.OK && rows.length) {
            resolve(rows.slice(0, 6));
          } else {
            resolve([]);
          }
        });
      });
    }

    function hideSuggestions(container) {
      container.classList.remove("active");
      container.innerHTML = "";
    }

    function renderPlaceSuggestions(input, container, rows) {
      container.innerHTML = "";
      if (!rows.length) {
        hideSuggestions(container);
        return;
      }

      rows.forEach((row) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "place-suggestion";
        const name = document.createElement("span");
        const address = document.createElement("small");
        name.textContent = row.place_name;
        address.textContent = row.road_address_name || row.address_name || "";
        button.append(name, address);
        button.addEventListener("click", () => {
          const selected = {
            label: row.place_name,
            lat: Number(row.y),
            lng: Number(row.x),
            ...latLngToTm(Number(row.y), Number(row.x))
          };
          input.value = row.place_name;
          if (input === startInput) {
            selectedStartPlace = selected;
            if (loopRouteInput.checked) selectedEndPlace = selected;
            syncLoopDestination();
          } else {
            selectedEndPlace = selected;
          }
          hideSuggestions(container);
          setWatchButtonVisible(false);
          lastStart = null;
          lastEnd = null;
          resetRoutesHistory();
          map.panTo(toLatLng(selected));
        });
        container.appendChild(button);
      });

      container.classList.add("active");
    }

    function attachPlaceAutocomplete(input, container, timerName) {
      input.addEventListener("input", () => {
        if (timerName === "start") {
          selectedStartPlace = null;
          if (loopRouteInput.checked) selectedEndPlace = null;
        } else {
          selectedEndPlace = null;
        }
        clearTimeout(timerName === "start" ? startSuggestTimer : endSuggestTimer);
        const run = async () => {
          const rows = await searchKakaoPlaces(input.value);
          renderPlaceSuggestions(input, container, rows);
        };

        if (timerName === "start") {
          startSuggestTimer = setTimeout(run, 220);
        } else {
          endSuggestTimer = setTimeout(run, 220);
        }
      });

      input.addEventListener("blur", () => {
        setTimeout(() => hideSuggestions(container), 160);
      });
    }

    async function geocode(text) {
      const coord = parseCoordinate(text);
      if (coord) return coord;
      const local = findLocalPlace(text);
      if (local) return local;
      return kakaoPlaceSearch(text);
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function pointToSegmentDistance(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (!dx && !dy) return distance(p, a);
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
      return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
    }

    function nearestSegmentInfo(p, points) {
      let best = { distance: Infinity, index: -1, t: 0, segmentLength: 0 };
      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const lengthSquared = dx * dx + dy * dy;
        const t = lengthSquared
          ? Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / lengthSquared))
          : 0;
        const projected = { x: a.x + dx * t, y: a.y + dy * t };
        const segmentDistance = Math.hypot(p.x - projected.x, p.y - projected.y);
        if (segmentDistance < best.distance) {
          best = {
            distance: segmentDistance,
            index: i,
            t,
            segmentLength: Math.sqrt(lengthSquared)
          };
        }
        if (best.distance < 3) break;
      }
      return best;
    }

    function routeNearLength(p, points, radius) {
      let meters = 0;
      for (let i = 0; i < points.length - 1; i += 1) {
        const a = points[i];
        const b = points[i + 1];
        const closeA = distance(p, a) <= radius;
        const closeB = distance(p, b) <= radius;
        const closeSegment = pointToSegmentDistance(p, a, b) <= radius;
        if (closeSegment) {
          meters += closeA && closeB ? distance(a, b) : Math.min(distance(a, b), radius * 1.8);
        }
      }
      return meters;
    }

    function crossingConfidence(light, tmPoints, nearest) {
      if (nearest.distance > 18) return 0;
      const nearLength = routeNearLength(light, tmPoints, 18);
      if (nearLength > 96) return 0;

      const before = tmPoints[Math.max(0, nearest.index - 1)];
      const after = tmPoints[Math.min(tmPoints.length - 1, nearest.index + 2)];
      const approach = distance(light, before);
      const departure = distance(light, after);
      const passesThrough = approach > 14 && departure > 14;
      const tightHit = nearest.distance <= 6 && passesThrough;
      const likelyCrossing = nearest.distance <= 12 && passesThrough && nearLength <= 70;

      if (tightHit) return 1;
      if (likelyCrossing) return .72;
      if (nearest.distance <= 10 && nearLength <= 58) return .58;
      if (nearest.distance <= 15 && passesThrough && nearLength <= 84) return .42;
      return 0;
    }

    function routeLength(points) {
      return points.slice(1).reduce((sum, p, i) => sum + distance(points[i], p), 0);
    }

    function latLngToRoutePoint(lat, lng) {
      return { lat, lng, ...latLngToTm(lat, lng) };
    }

    function tmPathDistance(points, startIndex, endIndex) {
      let meters = 0;
      for (let i = startIndex; i < endIndex; i += 1) {
        meters += distance(points[i], points[i + 1]);
      }
      return meters;
    }

    function compactShortBranches(tmPoints) {
      if (tmPoints.length < 5) return tmPoints;
      let points = tmPoints.slice();
      let changed = true;

      while (changed) {
        changed = false;
        for (let i = 0; i < points.length - 3; i += 1) {
          let best = null;
          for (let j = i + 2; j < Math.min(points.length, i + 80); j += 1) {
            const walked = tmPathDistance(points, i, j);
            if (walked > 500) break;

            const chord = distance(points[i], points[j]);
            const isTinyReturn = chord < 38 && walked > chord * 2.4;
            const isHook = chord < 95 && walked > 180 && walked > chord * 3.1;
            if (isTinyReturn || isHook) {
              best = { j, walked, chord };
            }
          }

          if (best && best.j > i + 1) {
            points.splice(i + 1, best.j - i - 1);
            changed = true;
            break;
          }
        }
      }

      return points;
    }

    function routeFromTmPoints(tmPoints, fallbackMeters) {
      return {
        latLngs: tmPoints.map((point) => [point.lat, point.lng]),
        tmPoints,
        meters: fallbackMeters
      };
    }

    function tmPointToLatLng(point) {
      const p = tmToLatLng(point.x, point.y);
      return [p.lat, p.lng];
    }

    function buildLoopWaypointSets(start, targetMeters) {
      const radius = Math.min(Math.max(targetMeters / (Math.PI * 2) * 1.08, 620), 1900);
      const basePatterns = [
        [0, 90, 180, 270],
        [45, 135, 225, 315],
        [0, 72, 144, 216, 288],
        [36, 108, 180, 252, 324],
        [-90, -15, 15, 90],
        [90, 165, 195, 270],
        [0, 120, 240],
        [60, 180, 300]
      ];
      const rotations = [0, 18, 36, 54, 72, 90, 126, 162];
      const scales = [.72, .86, 1, 1.14, 1.3];
      const sets = [];

      rotations.forEach((rotation, rotationIndex) => {
        basePatterns.forEach((pattern, patternIndex) => {
          const scale = scales[(rotationIndex + patternIndex) % scales.length];
          const stretch = patternIndex % 2 ? 1.18 : .88;
          const points = pattern.map((deg, pointIndex) => {
            const wobble = pointIndex % 2 ? 12 : -8;
            const rad = (deg + rotation + wobble) * Math.PI / 180;
            return {
              x: start.x + Math.cos(rad) * radius * scale * stretch,
              y: start.y + Math.sin(rad) * radius * scale / stretch
            };
          });
          sets.push([start, ...points, start]);
        });
      });

      return sets;
    }

    function buildWaypointSets(start, end, targetMeters) {
      if (distance(start, end) < 80) return buildLoopWaypointSets(start, targetMeters);
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const direct = Math.max(distance(start, end), 1);
      const nx = -dy / direct;
      const ny = dx / direct;
      const tx = dx / direct;
      const ty = dy / direct;
      const detour = Math.max(targetMeters - direct, targetMeters * .44);
      const side = Math.min(Math.max(detour / 2.8, 520), targetMeters / 2.35);
      const forward = Math.min(Math.max(targetMeters / 6, 480), 1550);
      const center = { x: (start.x + end.x) / 2, y: (start.y + end.y) / 2 };
      const sideFactors = [1, -1, 1.28, -1.28, .7, -.7, 1.55, -1.55, .42, -.42];
      const pushFactors = [.34, -.34, .12, -.12, .56, -.56];

      return sideFactors.flatMap((sign, index) => {
        const spread = side * sign;
        return pushFactors.slice(0, index < 4 ? 4 : 2).map((pushFactor, pushIndex) => {
          const push = forward * pushFactor;
          const bend = (pushIndex % 2 ? -.22 : .22) * side;
          const a = { x: center.x - tx * forward + nx * spread + tx * push, y: center.y - ty * forward + ny * spread + ty * push };
          const b = { x: center.x + tx * forward + nx * spread * .9 - tx * push, y: center.y + ty * forward + ny * spread * .9 - ty * push };
          const c = { x: center.x + nx * (spread * .32 + bend) - tx * forward * .16, y: center.y + ny * (spread * .32 + bend) - ty * forward * .16 };
          return index < 2 ? [start, a, b, end] : [start, a, c, b, end];
        });
      });
    }

    async function fetchPedestrianRoute(points) {
      const coords = points.map(tmPointToLatLng).map(([lat, lng]) => `${lng.toFixed(6)},${lat.toFixed(6)}`).join(";");
      const url = `https://routing.openstreetmap.de/routed-foot/route/v1/foot/${coords}?overview=full&geometries=geojson&steps=false`;
      const response = await fetch(url);
      if (!response.ok) throw new Error("보행자 경로 API 응답이 없습니다.");
      const data = await response.json();
      if (!data.routes || !data.routes[0]) throw new Error("보행자 경로를 찾지 못했습니다.");
      const route = data.routes[0];
      const latLngs = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      const tmPoints = latLngs.map(([lat, lng]) => latLngToRoutePoint(lat, lng));
      const compactedPoints = compactShortBranches(tmPoints);
      return routeFromTmPoints(compactedPoints, route.distance);
    }

    function analyzeCrossings(tmPoints) {
      const minX = Math.min(...tmPoints.map((p) => p.x)) - 110;
      const maxX = Math.max(...tmPoints.map((p) => p.x)) + 110;
      const minY = Math.min(...tmPoints.map((p) => p.y)) - 110;
      const maxY = Math.max(...tmPoints.map((p) => p.y)) + 110;
      const nearby = [];
      let score = 0;

      trafficLights.forEach((light) => {
        if (light.x < minX || light.x > maxX || light.y < minY || light.y > maxY) return;
        const nearest = nearestSegmentInfo(light, tmPoints);
        const confidence = crossingConfidence(light, tmPoints, nearest);
        if (confidence > 0) {
          nearby.push({ ...light, nearest: nearest.distance, crossingConfidence: confidence });
          score += confidence * Math.max(0, (14 - nearest.distance) / 14);
        } else if (nearest.distance < 44) {
          score += (44 - nearest.distance) / 500;
        }
      });

      nearby.sort((a, b) => a.nearest - b.nearest);
      const clusters = [];
      nearby.filter((p) => p.crossingConfidence >= .42).forEach((point) => {
        const cluster = clusters.find((group) => group.some((member) => distance(member, point) < 100));
        if (cluster) cluster.push(point);
        else clusters.push([point]);
      });
      const passedCrossings = clusters.map((cluster) => cluster.sort((a, b) => b.crossingConfidence - a.crossingConfidence || a.nearest - b.nearest)[0]);
      return { nearby, passedCrossings, score, crossed: passedCrossings.length };
    }

    function routeSignature(route) {
      const step = Math.max(1, Math.floor(route.latLngs.length / 8));
      const points = route.latLngs
        .filter((_, index) => index % step === 0)
        .map(([lat, lng]) => `${lat.toFixed(4)},${lng.toFixed(4)}`)
        .join("|");
      return `${Math.round(route.meters / 25)}:${points}`;
    }

    function routeCandidateKey(start, end, targetRange) {
      return [
        start.lat.toFixed(5),
        start.lng.toFixed(5),
        end.lat.toFixed(5),
        end.lng.toFixed(5),
        targetRange.min,
        targetRange.max
      ].join("|");
    }

    function ensureRouteCandidateState(start, end, targetRange) {
      const cacheKey = routeCandidateKey(start, end, targetRange);
      if (!routeCandidateState || routeCandidateState.key !== cacheKey) {
        const targetMeters = (targetRange.min + targetRange.max) / 2;
        routeCandidateState = {
          key: cacheKey,
          waypointSets: buildWaypointSets(start, end, targetMeters),
          nextIndex: 0,
          seenRoutes: new Set()
        };
      }
      return routeCandidateState;
    }

    function hasExhaustedRouteCandidates(start, end, targetRange) {
      const state = ensureRouteCandidateState(start, end, targetRange);
      return state.nextIndex >= state.waypointSets.length;
    }

    async function choosePedestrianRoute(start, end, targetRange) {
      const state = ensureRouteCandidateState(start, end, targetRange);
      while (state.waypointSets.length && state.nextIndex < state.waypointSets.length) {
        const waypoint = state.waypointSets[state.nextIndex];
        const index = state.nextIndex;
        state.nextIndex += 1;

        try {
          const route = await fetchPedestrianRoute(waypoint);
          if (!isRouteInsideTargetRange(route, targetRange)) {
            continue;
          }

          const signature = routeSignature(route);
          state.seenRoutes.add(signature);
          const crossing = analyzeCrossings(route.tmPoints);
          return {
            ...route,
            crossings: crossing.nearby,
            passedCrossings: crossing.passedCrossings,
            crossed: crossing.crossed,
            score: scoreRoute(route.meters, targetRange, crossing, index)
          };
        } catch (error) {
          console.warn(error);
        }
      }

      return null;
    }

    function isRouteInsideTargetRange(route, targetRange) {
      const isLastBucket = targetRange.max >= 11000;
      return route.meters >= targetRange.min && (isLastBucket ? route.meters <= targetRange.max : route.meters < targetRange.max);
    }

    function scoreRoute(meters, targetRange, crossing, index) {
      const center = (targetRange.min + targetRange.max) / 2;
      const error = Math.abs(meters - center);
      const distancePenalty = error * 1.2;
      return distancePenalty + crossing.crossed * 4500 + crossing.score * 850 + index * 18;
    }

    function parseTargetRange() {
      const value = document.querySelector("input[name='targetRange']:checked").value;
      const [minKm, maxKm] = value.split("-").map(Number);
      return { min: minKm * 1000, max: maxKm * 1000, label: value };
    }

    function formatKmRange(range) {
      return `${Math.round(range.min / 1000)}-${Math.round(range.max / 1000)}km`;
    }

    function trackAnalyticsEvent(eventName, params = {}) {
      if (typeof gtag !== "function") return;
      gtag("event", eventName, {
        app_name: "STOPLESS",
        ...params
      });
    }

    function setWatchButtonVisible(isVisible) {
      sendWatchBtn.hidden = !isVisible;
    }

    function addRouteArrows(path) {
      if (!path.length) return;
      const tmPath = path.map((point) => ({
        lat: point.getLat(),
        lng: point.getLng(),
        ...latLngToTm(point.getLat(), point.getLng())
      }));
      const segmentLengths = [];
      let totalLength = 0;

      for (let i = 0; i < tmPath.length - 1; i += 1) {
        const length = distance(tmPath[i], tmPath[i + 1]);
        segmentLengths.push(length);
        totalLength += length;
      }

      if (totalLength < 120) return;

      const spacing = Math.max(70, Math.min(130, totalLength / 26));
      for (let target = spacing; target < totalLength - spacing * .45; target += spacing) {
        let walked = 0;
        for (let i = 0; i < segmentLengths.length; i += 1) {
          const segmentLength = segmentLengths[i];
          if (walked + segmentLength < target || segmentLength < 1) {
            walked += segmentLength;
            continue;
          }

          const from = tmPath[i];
          const to = tmPath[i + 1];
          const ratio = (target - walked) / segmentLength;
          const x = from.x + (to.x - from.x) * ratio;
          const y = from.y + (to.y - from.y) * ratio;
          const point = tmToLatLng(x, y);
          const angle = Math.atan2(to.x - from.x, to.y - from.y) * 180 / Math.PI;
          const overlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(point.lat, point.lng),
            content: `<div class="route-arrow" style="transform: rotate(${angle}deg)"></div>`,
            xAnchor: .5,
            yAnchor: .5,
            zIndex: 4
          });
          overlay.setMap(map);
          overlays.push(overlay);
          break;
        }
      }
    }

    function drawBlueRoute(path, weight = 8) {
      const casing = new kakao.maps.Polyline({
        path,
        strokeWeight: weight + 7,
        strokeColor: "#FFFFFF",
        strokeOpacity: .94,
        strokeStyle: "solid"
      });
      const line = new kakao.maps.Polyline({
        path,
        strokeWeight: weight,
        strokeColor: "#3E6AE1",
        strokeOpacity: .98,
        strokeStyle: "solid"
      });
      casing.setMap(map);
      line.setMap(map);
      polylines.push(casing, line);
      addRouteArrows(path);
      return line;
    }

    function addPin(point, title) {
      const overlay = new kakao.maps.CustomOverlay({
        position: toLatLng(point),
        content: `<div class="pin" title="${title}"></div>`,
        yAnchor: 1
      });
      overlay.setMap(map);
      overlays.push(overlay);
    }

    function drawCrossings(crossings) {
      crossings.forEach((p) => {
        const circle = new kakao.maps.Circle({
          center: toLatLng(p),
          radius: 7,
          strokeWeight: 1,
          strokeColor: "#D92027",
          strokeOpacity: .72,
          fillColor: "#D92027",
          fillOpacity: .58
        });
        circle.setMap(map);
        circles.push(circle);
      });
    }

    function drawRoute(start, end, route, targetRange) {
      clearMap();
      clearDraftPins();
      const path = route.latLngs.map(([lat, lng]) => new kakao.maps.LatLng(lat, lng));
      drawBlueRoute(path, 8);

      drawCrossings(route.passedCrossings);
      addPin(start, "시작점");
      addPin(end, "도착점");

      const bounds = new kakao.maps.LatLngBounds();
      path.forEach((point) => bounds.extend(point));
      bounds.extend(toLatLng(start));
      bounds.extend(toLatLng(end));
      map.setBounds(bounds, 56, 56, 56, 56);

      const km = route.meters / 1000;
      distanceEl.textContent = `${km.toFixed(2)} km`;
      crossingsEl.textContent = `${route.crossed}개`;
      statusEl.textContent = route.fallback
        ? `보행자 경로 서버가 불안정해 임시 후보선을 표시했습니다. 다시 짜기를 눌러 재시도해 주세요.`
        : `${formatKmRange(targetRange)} 조건에 맞춰 횡단보도 통과 수가 적은 후보를 선택했습니다. 다시 짜기는 다음 차선책을 보여줍니다.`;
      mapBadgeEl.textContent = `파란 선은 추천 경로입니다. 루프/왕복 구간도 하나의 선으로 표시합니다. 빨간 점 ${route.crossed}개는 신호등 있는 횡단 지점입니다.`;
      setWatchButtonVisible(true);
    }

    function updateRouteNavButtons() {
      prevRouteBtn.disabled = currentRouteIndex <= 0;
      nextRouteBtn.disabled = currentRouteIndex < 0 || currentRouteIndex >= routesHistory.length - 1;
    }

    function resetRoutesHistory() {
      routesHistory = [];
      currentRouteIndex = -1;
      routeCandidateState = null;
      updateRouteNavButtons();
    }

    function appendRouteToHistory(start, end, route, targetRange) {
      routesHistory.push({ start, end, route, targetRange });
      currentRouteIndex = routesHistory.length - 1;
      updateRouteNavButtons();
    }

    function showStoredRoute(index) {
      if (index < 0 || index >= routesHistory.length) return;
      currentRouteIndex = index;
      const entry = routesHistory[currentRouteIndex];
      drawRoute(entry.start, entry.end, entry.route, entry.targetRange);
      updateRouteNavButtons();
    }

    function showPreviousRoute() {
      showStoredRoute(currentRouteIndex - 1);
    }

    function showNextRoute() {
      showStoredRoute(currentRouteIndex + 1);
    }

    async function ensureRouteEndpoints(targetRange, useLoop, startText, endText) {
      lastStart = selectedStartPlace && selectedStartPlace.label === startText
        ? selectedStartPlace
        : await geocode(startText);
      lastEnd = useLoop
        ? { ...lastStart, label: `${lastStart.label} 루프` }
        : selectedEndPlace && selectedEndPlace.label === endText
          ? selectedEndPlace
          : await geocode(endText);

      if (!useLoop && distance(lastStart, lastEnd) > targetRange.max) {
        const error = new Error(`시작점과 도착점 사이의 직선거리가 ${formatKmRange(targetRange)}의 최대 거리보다 깁니다. 목표 거리를 늘리거나 시작/도착점을 다시 선택해 주세요.`);
        error.showAlert = true;
        throw error;
      }
    }

    async function createAndStoreRoute({ reset = false } = {}) {
      const startText = startInput.value.trim();
      const endText = endInput.value.trim();
      const targetRange = parseTargetRange();
      const useLoop = loopRouteInput.checked || !endText;
      if (!startText || (!useLoop && !endText)) {
        setWatchButtonVisible(false);
        statusEl.textContent = "시작점을 입력해 주세요. 루프가 아니라면 도착점도 필요합니다.";
        return;
      }
      if (!KAKAO_READY) return;

      setWatchButtonVisible(false);
      makeRouteBtn.disabled = true;
      findNewBtn.disabled = true;
      prevRouteBtn.disabled = true;
      nextRouteBtn.disabled = true;
      statusEl.textContent = reset
        ? `${formatKmRange(targetRange)} 범위 안에서 첫 추천 코스를 찾고 있습니다.`
        : `${formatKmRange(targetRange)} 조건에서 새 추천 코스를 하나 찾고 있습니다.`;

      try {
        if (reset || !lastStart || !lastEnd) {
          resetRoutesHistory();
          await ensureRouteEndpoints(targetRange, useLoop, startText, endText);
        }

        if (hasExhaustedRouteCandidates(lastStart, lastEnd, targetRange)) {
          alert("더 이상 추천 가능한 경로가 없습니다.");
          statusEl.textContent = "현재 조건에서 더 이상 추천 가능한 경로가 없습니다. 기존 경로는 화살표로 계속 볼 수 있습니다.";
          return;
        }

        const route = await choosePedestrianRoute(lastStart, lastEnd, targetRange);
        if (!route) {
          alert("더 이상 추천 가능한 경로가 없습니다.");
          statusEl.textContent = `${formatKmRange(targetRange)} 범위 안에서 더 이상 추천 가능한 경로가 없습니다. 기존 경로는 화살표로 계속 볼 수 있습니다.`;
          return;
        }

        appendRouteToHistory(lastStart, lastEnd, route, targetRange);
        drawRoute(lastStart, lastEnd, route, targetRange);
      } catch (error) {
        setWatchButtonVisible(false);
        statusEl.textContent = error.message || "코스를 계산하지 못했습니다.";
        if (error.showAlert) alert(error.message);
      } finally {
        makeRouteBtn.disabled = false;
        findNewBtn.disabled = false;
        updateRouteNavButtons();
      }
    }
    document.querySelector("#routeForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const targetRange = parseTargetRange();
      trackAnalyticsEvent("run_click", {
        button_text: "RUN!",
        target_range: formatKmRange(targetRange),
        loop_route: loopRouteInput.checked ? "yes" : "no"
      });
      createAndStoreRoute({ reset: true });
    });

    findNewBtn.addEventListener("click", () => createAndStoreRoute({ reset: false }));
    prevRouteBtn.addEventListener("click", showPreviousRoute);
    nextRouteBtn.addEventListener("click", showNextRoute);

    pickStartBtn.addEventListener("click", () => setPickMode("start"));
    pickEndBtn.addEventListener("click", () => setPickMode("end"));

    document.querySelectorAll(".chip").forEach((button) => {
      button.addEventListener("click", () => {
        startInput.value = button.dataset.start;
        endInput.value = button.dataset.end;
        selectedStartPlace = null;
        selectedEndPlace = null;
        clearDraftPins();
        setWatchButtonVisible(false);
        lastStart = null;
        lastEnd = null;
        resetRoutesHistory();
        createAndStoreRoute({ reset: true });
      });
    });

    document.querySelectorAll("input[name='targetRange']").forEach((input) => {
      input.addEventListener("change", () => {
        setWatchButtonVisible(false);
        lastStart = null;
        lastEnd = null;
        resetRoutesHistory();
      });
    });

    function syncLoopDestination() {
      if (!loopRouteInput.checked) return;
      endInput.value = startInput.value;
      selectedEndPlace = selectedStartPlace;
      setWatchButtonVisible(false);
      lastStart = null;
      lastEnd = null;
      resetRoutesHistory();
    }

    startInput.addEventListener("input", syncLoopDestination);
    startInput.addEventListener("input", () => {
      setWatchButtonVisible(false);
      resetRoutesHistory();
    });
    endInput.addEventListener("input", () => {
      setWatchButtonVisible(false);
      resetRoutesHistory();
    });

    loopRouteInput.addEventListener("change", () => {
      setWatchButtonVisible(false);
      lastStart = null;
      lastEnd = null;
      resetRoutesHistory();
      if (loopRouteInput.checked) {
        endInput.value = startInput.value;
        selectedEndPlace = selectedStartPlace;
        mapBadgeEl.textContent = "루프 코스는 도착점에 시작점이 자동으로 들어가고, 출발지로 돌아옵니다.";
      }
    });

    attachPlaceAutocomplete(startInput, startSuggestions, "start");
    attachPlaceAutocomplete(endInput, endSuggestions, "end");

    sendWatchBtn.addEventListener("click", () => {
      trackAnalyticsEvent("watch_send_click", {
        button_text: "이 코스를 내 WATCH로 보내기"
      });
      alert("서비스 준비 중입니다");
    });

    initMap();
    startInput.value = "교대역";
    endInput.value = "예술의전당";
  </script>
</body>
</html>
